<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>花蓮旅遊 App V6</title>

<!-- Leaflet -->
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
}

header{
  background:#0077cc;
  color:white;
  text-align:center;
  padding:16px;
  font-size:22px;
  font-weight:bold;
}

#map{
  width:100%;
  height:320px;
}

.top-tools{
  background:white;
  padding:12px;
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  border-bottom:1px solid #ddd;
}

.nav{
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:white;
  position:sticky;
  top:0;
  z-index:999;
  border-bottom:1px solid #ddd;
}

.nav button{
  background:#0077cc;
  color:white;
  border:none;
  padding:10px 16px;
  border-radius:10px;
  font-size:14px;
}

.day-title{
  padding:12px;
  font-size:22px;
  font-weight:bold;
}

.card{
  background:white;
  margin:12px;
  padding:16px;
  border-radius:16px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.place{
  font-size:18px;
  font-weight:bold;
}

.time{
  margin-top:6px;
  color:#ff6600;
}

.btn-group{
  margin-top:12px;
}

.btn{
  display:inline-block;
  text-decoration:none;
  background:#0077cc;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  margin-right:8px;
  margin-top:8px;
  border:none;
  font-size:14px;
  cursor:pointer;
}

.route-btn{
  background:#ff6600;
}

.done{
  opacity:0.5;
  text-decoration:line-through;
}

.popup-title{
  font-weight:bold;
}
</style>
</head>

<body>

<header>
🌊 花蓮旅遊 App V6
</header>

<!-- 地圖 -->
<div id="map"></div>
<div id="locationInfo"
style="
background:white;
padding:12px;
font-size:16px;
font-weight:bold;
border-bottom:1px solid #ddd;
">
📍 定位中...
</div>

<!-- 工具列 -->
<div class="top-tools">

<button class="btn"
onclick="findNearby('parking')">
🅿️ 最近停車場
</button>

<button class="btn"
onclick="findNearby('fuel')">
⛽ 最近加油站
</button>

<button class="btn"
onclick="findNearby('convenience')">
🏪 附近超商
</button>

</div>

<!-- Day切換 -->
<div class="nav">
  <button onclick="scrollToDay('day1')">Day 1</button>
  <button onclick="scrollToDay('day2')">Day 2</button>
  <button onclick="scrollToDay('day3')">Day 3</button>
</div>

<!-- DAY 1 -->
<div id="day1">

<div class="day-title">📅 Day 1</div>

<div class="card">
  <div class="place">11:30 山下陳涼</div>

  <div class="time" id="time1">
    🚗 載入車程中...
  </div>

  <div class="btn-group">

    <button class="btn"
    onclick="showMap(23.9723,121.6067,'山下陳涼')">
      📍 地圖
    </button>

    <a
      class="btn route-btn"
      href="https://www.google.com/maps/dir/?api=1&destination=山下陳涼"
      target="_blank">
      🚗 導航
    </a>

    <button class="btn"
    onclick="toggleDone(this)">
      ✅ 完成
    </button>

  </div>
</div>

<div class="card">
  <div class="place">13:30 花蓮文創園區</div>

  <div class="time" id="time2">
    🚗 載入車程中...
  </div>

  <div class="btn-group">

    <button class="btn"
    onclick="showMap(23.9720,121.6045,'花蓮文創園區')">
      📍 地圖
    </button>

    <a
      class="btn route-btn"
      href="https://www.google.com/maps/dir/?api=1&destination=花蓮文化創意產業園區"
      target="_blank">
      🚗 導航
    </a>

    <button class="btn"
    onclick="toggleDone(this)">
      ✅ 完成
    </button>

  </div>
</div>

<div class="card">
  <div class="place">15:00 冠冕民宿旗艦館</div>

  <div class="time" id="time3">
    🚗 載入車程中...
  </div>

  <div class="btn-group">

    <button class="btn"
    onclick="showMap(23.9915,121.6010,'冠冕民宿旗艦館')">
      📍 地圖
    </button>

    <a
      class="btn route-btn"
      href="https://www.google.com/maps/dir/?api=1&destination=冠冕民宿 旗艦店"
      target="_blank">
      🚗 導航
    </a>

    <button class="btn"
    onclick="toggleDone(this)">
      ✅ 完成
    </button>

  </div>
</div>

<div class="card">
  <div class="place">19:00 東大門夜市</div>

  <div class="btn-group">

    <button class="btn"
    onclick="showMap(23.9727,121.6128,'東大門夜市')">
      📍 地圖
    </button>

    <a
      class="btn route-btn"
      href="https://www.google.com/maps/dir/?api=1&destination=東大門夜市"
      target="_blank">
      🚗 導航
    </a>

    <button class="btn"
    onclick="toggleDone(this)">
      ✅ 完成
    </button>

  </div>
</div>

</div>

<!-- DAY 2 -->
<div id="day2">

<div class="day-title">📅 Day 2</div>

<div class="card">
  <div class="place">10:30 V TREE COFFEE</div>

  <div class="btn-group">

    <button class="btn"
    onclick="showMap(23.9898,121.6050,'V TREE COFFEE')">
      📍 地圖
    </button>

    <button class="btn"
    onclick="toggleDone(this)">
      ✅ 完成
    </button>

  </div>
</div>

<div class="card">
  <div class="place">13:00 花蓮美術館</div>

  <div class="btn-group">

    <button class="btn"
    onclick="showMap(23.9908,121.6115,'花蓮美術館')">
      📍 地圖
    </button>

    <button class="btn"
    onclick="toggleDone(this)">
      ✅ 完成
    </button>

  </div>
</div>

<div class="card">
  <div class="place">14:00 小吃巡禮</div>

  <div class="btn-group">

    <button class="btn"
    onclick="showMap(23.9760,121.6047,'公正包子')">
      🥟 公正包子
    </button>

    <button class="btn"
    onclick="showMap(23.9755,121.6050,'周家蒸餃')">
      🥟 周家蒸餃
    </button>

    <button class="btn"
    onclick="showMap(23.9752,121.6044,'廟口紅茶')">
      🧋 廟口紅茶
    </button>

  </div>
</div>

</div>

<!-- DAY 3 -->
<div id="day3">

<div class="day-title">📅 Day 3</div>

<div class="card">
  <div class="place">08:00 斑比早餐店</div>

  <div class="btn-group">

    <button class="btn"
    onclick="showMap(23.9855,121.6018,'斑比早餐店')">
      📍 地圖
    </button>

    <button class="btn"
    onclick="toggleDone(this)">
      ✅ 完成
    </button>

  </div>
</div>

<div class="card">
  <div class="place">返回台北（礁溪）</div>

  <div class="btn-group">

    <a
      class="btn route-btn"
      href="https://www.google.com/maps/dir/?api=1&destination=福哥石窯雞 礁溪"
      target="_blank">
      🚗 開始導航
    </a>

  </div>
</div>

</div>

<script>

/* 初始化地圖 */
const map = L.map('map').setView([23.987,121.601], 13);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
 attribution:'© OpenStreetMap'
}
).addTo(map);

let marker;
let nearbyMarkers = [];

/* 顯示地圖 */
function showMap(lat,lng,name){

  clearNearby();

  if(marker){
    map.removeLayer(marker);
  }

  marker = L.marker([lat,lng])
  .addTo(map)
  .bindPopup(`<div class="popup-title">${name}</div>`)
  .openPopup();

  map.setView([lat,lng],15);
}

/* Day切換 */
function scrollToDay(id){
  document.getElementById(id)
  .scrollIntoView({
    behavior:'smooth'
  });
}

/* 完成 */
function toggleDone(btn){
  btn.parentElement.parentElement
  .classList.toggle('done');
}

/* 清除附近marker */
function clearNearby(){

  nearbyMarkers.forEach(m=>{
    map.removeLayer(m);
  });

  nearbyMarkers = [];
}

/* 免費即時車程 */
async function getDriveTime(
startLat,
startLng,
endLat,
endLng,
elementId
){

  const url =
  `https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${endLng},${endLat}?overview=false`;

  const response = await fetch(url);

  const data = await response.json();

  const seconds =
  data.routes[0].duration;

  const minutes =
  Math.round(seconds / 60);

  document.getElementById(elementId)
  .innerHTML =
  `🚗 即時車程：約 ${minutes} 分鐘`;
}

/* 附近搜尋 */
async function findNearby(type){

  if(!navigator.geolocation){

    alert("你的裝置不支援定位");

    return;
  }

  navigator.geolocation.getCurrentPosition(
  async (position)=>{

    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    let queryType = '';

    if(type === 'parking'){
      queryType = 'parking';
    }

    if(type === 'fuel'){
      queryType = 'fuel';
    }

    if(type === 'convenience'){
      queryType = 'convenience';
    }

    const query = `
    [out:json];
    (
      node["amenity"="${queryType}"](around:3000,${lat},${lng});
    );
    out;
    `;

    const url =
    "https://overpass-api.de/api/interpreter?data="
    + encodeURIComponent(query);

    const response =
    await fetch(url);

    const data =
    await response.json();

    clearNearby();

    /* 目前位置 */
    const userMarker =
    L.marker([lat,lng])
    .addTo(map)
    .bindPopup("📍 你的位置")
    .openPopup();

    nearbyMarkers.push(userMarker);

    /* 顯示搜尋結果 */
    data.elements.forEach(place=>{

      const marker =
      L.marker([place.lat, place.lon])
      .addTo(map);

      const name =
      place.tags.name ||
      (
        type === 'parking'
        ? '停車場'
        : type === 'fuel'
        ? '加油站'
        : '便利商店'
      );

      marker.bindPopup(name);

      nearbyMarkers.push(marker);

    });

    map.setView([lat,lng],14);

  });
}

/* 即時車程 */
getDriveTime(
23.9723,121.6067,
23.9720,121.6045,
'time1'
);

getDriveTime(
23.9720,121.6045,
23.9915,121.6010,
'time2'
);

getDriveTime(
23.9915,121.6010,
23.9727,121.6128,
'time3'
);
/* ===== 自動定位模式 ===== */

/* 所有行程點 */
const tripSpots = [

{
  name:"山下陳涼",
  lat:23.9723,
  lng:121.6067
},

{
  name:"花蓮文創園區",
  lat:23.9720,
  lng:121.6045
},

{
  name:"冠冕民宿旗艦館",
  lat:23.9915,
  lng:121.6010
},

{
  name:"東大門夜市",
  lat:23.9727,
  lng:121.6128
},

{
  name:"V TREE COFFEE",
  lat:23.9898,
  lng:121.6050
},

{
  name:"花蓮美術館",
  lat:23.9908,
  lng:121.6115
},

{
  name:"斑比早餐店",
  lat:23.9855,
  lng:121.6018
}

];

/* 計算距離 */
function getDistance(lat1,lng1,lat2,lng2){

  const R = 6371;

  const dLat =
  (lat2-lat1) * Math.PI / 180;

  const dLng =
  (lng2-lng1) * Math.PI / 180;

  const a =
  Math.sin(dLat/2) *
  Math.sin(dLat/2) +

  Math.cos(lat1*Math.PI/180) *
  Math.cos(lat2*Math.PI/180) *

  Math.sin(dLng/2) *
  Math.sin(dLng/2);

  const c =
  2 * Math.atan2(
    Math.sqrt(a),
    Math.sqrt(1-a)
  );

  return R * c;
}

/* 自動定位 */
function autoLocate(){

  if(!navigator.geolocation){

    document
    .getElementById("locationInfo")
    .innerHTML =
    "❌ 裝置不支援定位";

    return;
  }

  navigator.geolocation.getCurrentPosition(
  (position)=>{

    const lat =
    position.coords.latitude;

    const lng =
    position.coords.longitude;

    /* 地圖移動 */
    map.setView([lat,lng],15);

    /* 使用者marker */
    const userMarker =
    L.marker([lat,lng])
    .addTo(map)
    .bindPopup("📍 你目前位置")
    .openPopup();

    /* 找最近景點 */
    let nearest = null;

    let minDistance = Infinity;

    tripSpots.forEach(spot=>{

      const distance =
      getDistance(
        lat,lng,
        spot.lat,spot.lng
      );

      if(distance < minDistance){

        minDistance = distance;

        nearest = spot;
      }
    });

    /* 顯示資訊 */
    document
    .getElementById("locationInfo")
    .innerHTML =

    `
    📍 你目前位置附近：
    <br><br>

    🎯 最近行程點：
    ${nearest.name}

    <br><br>

    🚗 距離約：
    ${minDistance.toFixed(1)} km

    <br><br>

    <a
    href="
    https://www.google.com/maps/dir/?api=1&destination=${nearest.name}
    "
    target="_blank"
    style="
    background:#ff6600;
    color:white;
    padding:8px 12px;
    border-radius:8px;
    text-decoration:none;
    ">
    🚗 立即導航
    </a>
    `;

  },

  ()=>{

    document
    .getElementById("locationInfo")
    .innerHTML =
    "❌ 定位失敗";

  });
}

/* 啟動自動定位 */
autoLocate();
</script>

</body>
</html>
